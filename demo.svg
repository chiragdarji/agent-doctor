<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 530" width="760" height="530">

  <!-- Window background -->
  <rect width="760" height="530" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="760" height="38" rx="10" fill="#161b22"/>
  <rect y="27" width="760" height="11" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#28c941"/>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle"
        font-size="12" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace"
        fill="#6e7681">agent-doctor -- terminal</text>

  <!-- =====================================================
       PROMPT 1
  ===================================================== -->
  <text x="18" y="64" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace">
    <tspan fill="#3fb950">~/project</tspan><tspan fill="#6e7681"> $ </tspan>
  </text>

  <!-- command text -->
  <text x="98" y="64" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace"
        fill="#e6edf3" opacity="0">
    ANTHROPIC_API_KEY=sk-ant-... npx agent-doctor CLAUDE.md
    <animate attributeName="opacity" to="1" begin="0.4s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- blinking cursor -->
  <rect x="98" y="52" width="8" height="15" fill="#e6edf3" opacity="0">
    <animate attributeName="opacity" to="1" begin="0s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" to="0" begin="0.9s" dur="0.01s" fill="freeze"/>
  </rect>

  <!-- =====================================================
       OUTPUT LINES — each fades in sequentially
  ===================================================== -->

  <!-- Header -->
  <text x="18" y="88" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">agent-doctor  Analysing </tspan>
    <tspan fill="#79c0ff">CLAUDE.md</tspan>
    <tspan fill="#6e7681">...</tspan>
    <animate attributeName="opacity" to="1" begin="1.0s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- CRITICAL 1 header -->
  <text x="18" y="112" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#ff7b72" font-weight="bold">X  CRITICAL</tspan>
    <tspan fill="#e6edf3">  Incomplete instruction marker </tspan>
    <tspan fill="#e3b341">"TODO"</tspan>
    <tspan fill="#e6edf3"> found</tspan>
    <animate attributeName="opacity" to="1" begin="1.3s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="128" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    Line 14: </tspan>
    <tspan fill="#e3b341">"TODO: add tool constraints here"</tspan>
    <animate attributeName="opacity" to="1" begin="1.5s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="144" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace"
        fill="#6e7681" opacity="0">
    <tspan>    Agent will follow this literally -- replace before deploying.</tspan>
    <animate attributeName="opacity" to="1" begin="1.7s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="160" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    -&gt; </tspan>
    <tspan fill="#56d364">Replace the placeholder with the actual instruction.</tspan>
    <animate attributeName="opacity" to="1" begin="1.9s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- CRITICAL 2 header -->
  <text x="18" y="184" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#ff7b72" font-weight="bold">X  CRITICAL</tspan>
    <tspan fill="#e6edf3">  Unclosed code fence (</tspan>
    <tspan fill="#e3b341">```</tspan>
    <tspan fill="#e6edf3">) -- everything after line 22 is code</tspan>
    <animate attributeName="opacity" to="1" begin="2.1s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="200" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace"
        fill="#6e7681" opacity="0">
    <tspan>    Agent reads the rest of the file as a code block.</tspan>
    <animate attributeName="opacity" to="1" begin="2.3s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="216" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    -&gt; </tspan>
    <tspan fill="#56d364">Add a closing ``` fence to end the code block.</tspan>
    <animate attributeName="opacity" to="1" begin="2.5s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- WARNING: decision-loop -->
  <text x="18" y="240" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#e3b341" font-weight="bold">!  WARNING</tspan>
    <tspan fill="#e6edf3">   Rule 8 x Rule 12 -- </tspan>
    <tspan fill="#ff7b72">Decision loop detected</tspan>
    <animate attributeName="opacity" to="1" begin="2.7s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="256" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    Rule 8:  </tspan>
    <tspan fill="#e6edf3">"Always ask before making file changes"</tspan>
    <animate attributeName="opacity" to="1" begin="2.9s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="272" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    Rule 12: </tspan>
    <tspan fill="#e6edf3">"Complete tasks autonomously without interruption"</tspan>
    <animate attributeName="opacity" to="1" begin="3.1s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="288" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    -&gt; </tspan>
    <tspan fill="#56d364">Add scope: "Ask only before destructive operations."</tspan>
    <animate attributeName="opacity" to="1" begin="3.3s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- WARNING: duplicate heading -->
  <text x="18" y="312" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#e3b341" font-weight="bold">!  WARNING</tspan>
    <tspan fill="#e6edf3">   Heading </tspan>
    <tspan fill="#79c0ff">"Rules"</tspan>
    <tspan fill="#e6edf3"> appears twice (lines 8 and 34)</tspan>
    <animate attributeName="opacity" to="1" begin="3.5s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="328" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    -&gt; </tspan>
    <tspan fill="#56d364">Rename or merge -- agents cannot determine which takes precedence.</tspan>
    <animate attributeName="opacity" to="1" begin="3.7s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- SUGGEST -->
  <text x="18" y="352" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#79c0ff" font-weight="bold">i  SUGGEST</tspan>
    <tspan fill="#e6edf3">   Section </tspan>
    <tspan fill="#79c0ff">"Output Format"</tspan>
    <tspan fill="#e6edf3"> has &gt;60% negation-based instructions</tspan>
    <animate attributeName="opacity" to="1" begin="3.9s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="368" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">    -&gt; </tspan>
    <tspan fill="#56d364">Rewrite positive: "Never write long responses" -&gt; "Keep under 100 words"</tspan>
    <animate attributeName="opacity" to="1" begin="4.1s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- Divider line -->
  <line x1="18" y1="382" x2="742" y2="382" stroke="#21262d" stroke-width="1" opacity="0">
    <animate attributeName="opacity" to="1" begin="4.3s" dur="0.01s" fill="freeze"/>
  </line>

  <!-- Score block -->
  <text x="18" y="400" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#e6edf3" font-weight="bold">Health Score  </tspan>
    <tspan fill="#ff7b72" font-weight="bold">48 / 100  (D)</tspan>
    <animate attributeName="opacity" to="1" begin="4.4s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="416" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">Issues        </tspan>
    <tspan fill="#ff7b72">2 critical</tspan>
    <tspan fill="#6e7681"> . </tspan>
    <tspan fill="#e3b341">2 warnings</tspan>
    <tspan fill="#6e7681"> . </tspan>
    <tspan fill="#79c0ff">1 suggestion</tspan>
    <animate attributeName="opacity" to="1" begin="4.5s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="432" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#6e7681">Files         </tspan><tspan fill="#e6edf3">CLAUDE.md</tspan>
    <tspan fill="#6e7681">   Model  </tspan><tspan fill="#d2a8ff">claude-sonnet-4-6</tspan>
    <animate attributeName="opacity" to="1" begin="4.6s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- Divider line 2 -->
  <line x1="18" y1="445" x2="742" y2="445" stroke="#21262d" stroke-width="1" opacity="0">
    <animate attributeName="opacity" to="1" begin="4.7s" dur="0.01s" fill="freeze"/>
  </line>

  <!-- =====================================================
       PROMPT 2: --fix
  ===================================================== -->
  <text x="18" y="466" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#3fb950">~/project</tspan><tspan fill="#6e7681"> $ </tspan>
    <animate attributeName="opacity" to="1" begin="5.2s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="98" y="466" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace"
        fill="#e6edf3" opacity="0">
    npx agent-doctor CLAUDE.md --fix
    <animate attributeName="opacity" to="1" begin="5.6s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- fix result -->
  <text x="18" y="490" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#56d364" font-weight="bold">Fixed: </tspan>
    <tspan fill="#e6edf3">todo-in-instructions, unclosed-code-block</tspan>
    <tspan fill="#6e7681">  in CLAUDE.md</tspan>
    <animate attributeName="opacity" to="1" begin="6.3s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="18" y="510" font-size="13"
        font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" opacity="0">
    <tspan fill="#56d364" font-weight="bold">Skipped (no auto-fix): </tspan>
    <tspan fill="#6e7681">decision-loop, duplicate-heading  (semantic rules require --fix manually)</tspan>
    <animate attributeName="opacity" to="1" begin="6.5s" dur="0.01s" fill="freeze"/>
  </text>

</svg>
